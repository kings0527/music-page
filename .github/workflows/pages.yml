name: Deploy music player to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository and LFS audio
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Validate player and playlist
        run: |
          python3 -m unittest -v tests/test_site.py
          node --test tests/player_logic.test.mjs

      - name: Prepare static site
        run: |
          mkdir -p _site/audio
          cp index.html styles.css app.js player-logic.js tracks.json _site/
          cp -R audio/. _site/audio/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
